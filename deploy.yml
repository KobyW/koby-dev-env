---
# Run remotely via: ansible-playbook -i <inventory> deploy.yml --extra-vars "@/creds/<vault>.yml" --ask-vault-pass --private-key=<private-key-path>
# Run locally via: ansible-playbook deploy.yml -i localhost, --connection=local --ask-become-pass
# Or use helper script: ./deploy-local.sh
#
# Use tags to control which tasks run:
#   --tags "light" - Install lightweight tools and configs
#   --tags "heavy" - Install resource-intensive tools
#   --tags "zsh,tmux" - Install specific tools only
#   --skip-tags "heavy" - Install everything except heavy tools
# By default (no tags specified), all tasks will run
#
# Prerequisites:
#   - macOS: brew must be installed (https://brew.sh)
#   - macOS: ansible-galaxy collection install community.general
#
# Error handling: ignore_errors is set play-wide, so failed tasks do not abort
# the run; they appear as 'ignored' in the standard play recap at the end
- name: Setup Development Environment
  hosts: all
  gather_facts: yes
  ignore_errors: yes
  vars:
    # Set ansible_user based on whether we're running locally or remotely
    # For localhost, use the current user; for remote, use vault variables
    ansible_user: "{{ vault_ansible_user | default(lookup('env', 'USER')) }}"
    ansible_sudo_pass: "{{ vault_sudo_pass | default(omit) }}"
    # Automatically detect localhost and set connection appropriately
    ansible_connection: "{{ 'local' if inventory_hostname in ['localhost', '127.0.0.1'] else 'ssh' }}"

    # OS detection
    is_macos: "{{ ansible_system == 'Darwin' }}"
    is_linux: "{{ ansible_system == 'Linux' }}"
    home_dir: "{{ ansible_env.HOME | default('/home/' + ansible_user) }}"
    brew_prefix: "{{ '/opt/homebrew' if ansible_architecture == 'arm64' else '/usr/local' }}"

    # Neovim: official release tarballs cover Linux x86_64 + arm64 and macOS
    neovim_version: "v0.12.4"
    neovim_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'x86_64' }}"

    # Suffix for one-time config backups so repeated runs never overwrite them
    backup_suffix: "{{ ansible_date_time.iso8601_basic_short }}"

    # Package lists per OS
    linux_base_packages:
      - git
      - curl
      - python3-pip
      - build-essential
      - net-tools
      - nmap
      - unzip
    macos_base_packages:
      - git
      - curl
      - python3
      - nmap
      - unzip

    linux_light_packages:
      - bat
      - fzf
      - expect
      - wget
      - zsh
      - tmux
      - ripgrep   # telescope live_grep
    macos_light_packages:
      - bat
      - fzf
      - expect
      - wget
      - zsh
      - tmux
      - ripgrep   # telescope live_grep
      - pfetch
      - lazygit
      - lazydocker

    linux_heavy_packages:
      - docker.io
      - npm
    macos_heavy_packages:
      - node


  tasks:

    ### PRE-FLIGHT CHECKS ###
    - name: Check for Homebrew on macOS
      ansible.builtin.shell: command -v brew
      register: brew_check
      failed_when: false
      changed_when: false
      when: is_macos
      tags:
        - always

    - name: Fail if Homebrew is not installed on macOS
      ansible.builtin.fail:
        msg: |
          Homebrew is required on macOS but was not found.
          Install it with:
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          Then re-run this playbook.
      when: is_macos and brew_check.rc != 0
      tags:
        - always

    - name: Check for Xcode Command Line Tools on macOS
      ansible.builtin.shell: xcode-select -p
      register: xcode_check
      failed_when: false
      changed_when: false
      when: is_macos
      tags:
        - always

    - name: Warn if Xcode CLT missing
      ansible.builtin.debug:
        msg: "Xcode Command Line Tools not found. Install with: xcode-select --install"
      when: is_macos and xcode_check.rc != 0
      tags:
        - always


    ### REQUIRED START ###
    - name: Install base packages (Linux)
      become: yes
      ansible.builtin.package:
        name: "{{ linux_base_packages }}"
        state: present
      when: is_linux
      tags:
        - always

    - name: Install base packages (macOS)
      community.general.homebrew:
        name: "{{ macos_base_packages }}"
        state: present
      when: is_macos
      tags:
        - always

    - name: Clone koby-dev-env repository
      ansible.builtin.git:
        repo: https://github.com/KobyW/koby-dev-env
        dest: "{{ home_dir }}/koby-dev-env"
        version: main
        update: no
      tags:
        - always

    - name: Sync koby-dev-env repository
      ansible.builtin.git:
        repo: https://github.com/KobyW/koby-dev-env
        dest: "{{ home_dir }}/koby-dev-env"
        version: main
        update: yes
      tags:
        - never
        - sync
    ### REQUIRED END ###


    ### LIGHT MISC START ###
    - name: Install light packages (Linux)
      become: yes
      ansible.builtin.package:
        name: "{{ linux_light_packages }}"
        state: present
      when: is_linux
      tags:
        - light

    - name: Install light packages (macOS)
      community.general.homebrew:
        name: "{{ macos_light_packages }}"
        state: present
      when: is_macos
      tags:
        - light

    - name: Install zoxide
      ansible.builtin.shell: curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | bash
      args:
        creates: "{{ home_dir }}/.local/bin/zoxide"
      tags:
        - light
        - zoxide
    ### LIGHT MISC END ###


    ### ZSH START ###
    - name: Check if Oh My Zsh is installed
      ansible.builtin.stat:
        path: "{{ home_dir }}/.oh-my-zsh"
      register: oh_my_zsh_installed
      tags:
        - light
        - zsh
        - oh-my-zsh

    - name: Install Oh My Zsh
      ansible.builtin.shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      when:
        - not oh_my_zsh_installed.stat.exists
      tags:
        - light
        - zsh
        - oh-my-zsh

    - name: Install zsh-autosuggestions
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "{{ home_dir }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        update: no
      tags:
        - light
        - zsh
        - zsh-autosuggestions

    - name: Copy .zshrc to home directory
      block:

        - name: Check existing .zshrc
          ansible.builtin.stat:
            path: "{{ home_dir }}/.zshrc"
          register: zshrc_stat

        - name: Backup existing .zshrc (only if it is a real file, not our symlink)
          ansible.builtin.copy:
            src: "{{ home_dir }}/.zshrc"
            dest: "{{ home_dir }}/.zshrc.bak-{{ backup_suffix }}"
            remote_src: yes
          when: zshrc_stat.stat.exists and not zshrc_stat.stat.islnk

        - name: Link .zshrc
          ansible.builtin.file:
            src: "{{ home_dir }}/koby-dev-env/configs/zshrc"
            dest: "{{ home_dir }}/.zshrc"
            state: link
            force: yes

      tags:
        - light
        - zsh
        - zshrc-copy

    - name: Ensure zsh is the default shell (Linux)
      become: yes
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /bin/zsh
      when: is_linux
      tags:
        - light
        - zsh
        - zsh-shell

    - name: Ensure zsh is the default shell (macOS)
      ansible.builtin.shell: chsh -s /bin/zsh
      changed_when: false
      when: is_macos
      tags:
        - light
        - zsh
        - zsh-shell

    - name: Export SHELL environment variable
      ansible.builtin.lineinfile:
        path: "{{ home_dir }}/.bashrc"
        line: 'export SHELL=/bin/zsh'
        create: yes
      tags:
        - light
        - zsh
        - zsh-shell
    ### ZSH END ###


    ### P10k START ###
    - name: Install P10K
      block:

        - name: Clone Powerlevel10k repository
          ansible.builtin.git:
            repo: 'https://github.com/romkatv/powerlevel10k.git'
            dest: "{{ home_dir }}/powerlevel10k"
            depth: 1

        - name: Check existing p10k.zsh
          ansible.builtin.stat:
            path: "{{ home_dir }}/.p10k.zsh"
          register: p10k_stat

        - name: Backup existing p10k.zsh (only if it is a real file, not our symlink)
          ansible.builtin.copy:
            src: "{{ home_dir }}/.p10k.zsh"
            dest: "{{ home_dir }}/.p10k.zsh.bak-{{ backup_suffix }}"
            remote_src: yes
          when: p10k_stat.stat.exists and not p10k_stat.stat.islnk

        - name: Link p10k.zsh
          ansible.builtin.file:
            src: "{{ home_dir }}/koby-dev-env/configs/p10k.zsh"
            dest: "{{ home_dir }}/.p10k.zsh"
            state: link
            force: yes

      tags:
        - light
        - p10k
    ### P10k END ###


    ### NeoVim START ###
    # Official Neovim release tarballs cover Linux x86_64 + arm64; macOS uses brew.
    # Version is pinned once via the neovim_version var at the top of this playbook.
    - name: Check current Neovim version
      ansible.builtin.shell: |
        if command -v nvim &> /dev/null; then
          nvim --version | head -n1
        else
          echo "No nvim found"
        fi
      register: current_nvim_version
      failed_when: false
      changed_when: false
      tags:
        - light
        - neovim

    - name: Display current Neovim version
      ansible.builtin.debug:
        msg: "Current Neovim: {{ current_nvim_version.stdout }} (target: {{ neovim_version }})"
      tags:
        - light
        - neovim

    - name: Install Neovim {{ neovim_version }} (Linux)
      block:
        - name: Ensure directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - "{{ home_dir }}/.local"
            - "{{ home_dir }}/.local/bin"

        - name: Download Neovim release tarball ({{ neovim_arch }})
          ansible.builtin.get_url:
            url: "https://github.com/neovim/neovim/releases/download/{{ neovim_version }}/nvim-linux-{{ neovim_arch }}.tar.gz"
            dest: "/tmp/nvim-linux-{{ neovim_arch }}.tar.gz"
            mode: '0644'

        - name: Remove previous Neovim install dirs (including legacy layouts)
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ home_dir }}/.local/nvim-linux-{{ neovim_arch }}"
            - "{{ home_dir }}/.local/nvim-linux64"
            - "{{ home_dir }}/.local/nvim-app"
            - "{{ home_dir }}/.local/nvim-appimage"

        - name: Extract Neovim
          ansible.builtin.unarchive:
            src: "/tmp/nvim-linux-{{ neovim_arch }}.tar.gz"
            dest: "{{ home_dir }}/.local/"
            remote_src: yes

        - name: Create symlink in user's local bin
          ansible.builtin.file:
            src: "{{ home_dir }}/.local/nvim-linux-{{ neovim_arch }}/bin/nvim"
            dest: "{{ home_dir }}/.local/bin/nvim"
            state: link
            force: yes

        - name: Remove Neovim archive
          ansible.builtin.file:
            path: "/tmp/nvim-linux-{{ neovim_arch }}.tar.gz"
            state: absent

        - name: Create symlink in /usr/local/bin
          become: yes
          ansible.builtin.file:
            src: "{{ home_dir }}/.local/bin/nvim"
            dest: "/usr/local/bin/nvim"
            state: link
            force: yes

        - name: Verify Neovim installation
          ansible.builtin.shell: |
            export PATH="{{ home_dir }}/.local/bin:/usr/local/bin:$PATH"
            which nvim && nvim --version
          register: nvim_verify
          changed_when: false
          failed_when: false

        - name: Display Neovim version
          ansible.builtin.debug:
            msg: "Neovim installed: {{ nvim_verify.stdout | default('Installation may have failed') }}"

      when:
        - is_linux
        - "neovim_version not in current_nvim_version.stdout"
      tags:
        - light
        - neovim

    - name: Install Neovim (macOS/brew)
      community.general.homebrew:
        name: neovim
        state: present
      when: is_macos
      tags:
        - light
        - neovim
    ### NeoVim END ###


    ### LUNARVIM MIGRATION START ###
    # LunarVim is unmaintained; this repo now ships a bare Neovim config
    # (configs/nvim). Any existing LunarVim install is archived to a
    # timestamped tarball in ~/.dotfile-backups and then removed.
    - name: Check for LunarVim launcher
      ansible.builtin.stat:
        path: "{{ home_dir }}/.local/bin/lvim"
      register: lvim_bin
      tags:
        - light
        - neovim
        - lvim-migrate

    - name: Check for LunarVim config directory
      ansible.builtin.stat:
        path: "{{ home_dir }}/.config/lvim"
      register: lvim_cfg
      tags:
        - light
        - neovim
        - lvim-migrate

    - name: Back up and decommission LunarVim (idempotent)
      ansible.builtin.script: "{{ playbook_dir }}/util/misc/decommission-lunarvim.sh"
      when: lvim_bin.stat.exists or lvim_cfg.stat.exists
      tags:
        - light
        - neovim
        - lvim-migrate
    ### LUNARVIM MIGRATION END ###


    ### NEOVIM CONFIG START ###
    - name: Check existing ~/.config/nvim
      ansible.builtin.stat:
        path: "{{ home_dir }}/.config/nvim"
      register: nvim_cfg_stat
      tags:
        - light
        - neovim
        - nvim-config

    - name: Back up existing ~/.config/nvim (only if it is not our symlink)
      ansible.builtin.command:
        argv:
          - mv
          - "{{ home_dir }}/.config/nvim"
          - "{{ home_dir }}/.config/nvim.bak-{{ backup_suffix }}"
      when: nvim_cfg_stat.stat.exists and not nvim_cfg_stat.stat.islnk
      tags:
        - light
        - neovim
        - nvim-config

    - name: Ensure ~/.config exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.config"
        state: directory
        mode: '0755'
      tags:
        - light
        - neovim
        - nvim-config

    - name: Link ~/.config/nvim to repo config
      ansible.builtin.file:
        src: "{{ home_dir }}/koby-dev-env/configs/nvim"
        dest: "{{ home_dir }}/.config/nvim"
        state: link
        force: yes
      tags:
        - light
        - neovim
        - nvim-config
    ### NEOVIM CONFIG END ###


    ### TMUX START ###
    - name: Install tpm (tmux plugin manager)
      ansible.builtin.git:
        repo: https://github.com/tmux-plugins/tpm
        dest: "{{ home_dir }}/.tmux/plugins/tpm"
        update: no
      tags:
        - light
        - tmux
        - tpm

    - name: Copy .tmux.conf to home directory
      block:
        - name: Check existing .tmux.conf
          ansible.builtin.stat:
            path: "{{ home_dir }}/.tmux.conf"
          register: tmux_conf_stat
        - name: Backup existing .tmux.conf (only if it is a real file, not our symlink)
          ansible.builtin.copy:
            src: "{{ home_dir }}/.tmux.conf"
            dest: "{{ home_dir }}/.tmux.conf.bak-{{ backup_suffix }}"
            remote_src: yes
          when: tmux_conf_stat.stat.exists and not tmux_conf_stat.stat.islnk
        - name: Link .tmux.conf
          ansible.builtin.file:
            src: "{{ home_dir }}/koby-dev-env/configs/tmux.conf"
            dest: "{{ home_dir }}/.tmux.conf"
            state: link
            force: yes
      tags:
        - light
        - tmux
        - tmux-copy
    ### TMUX END ###


    ### CLAUDE CONFIG START ###
    # Symlinks repo Claude Code assets into ~/.claude so git updates propagate.
    # (Symlinks, not hardlinks - git checkouts silently break hardlinks.)
    - name: Ensure ~/.claude directories exist
      ansible.builtin.file:
        path: "{{ home_dir }}/.claude/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - commands
        - scripts
        - skills
      tags:
        - light
        - claude

    - name: Find repo Claude command files
      ansible.builtin.find:
        paths: "{{ home_dir }}/koby-dev-env/configs/claude/commands"
        patterns: "*.md"
      register: claude_commands
      tags:
        - light
        - claude

    - name: Link Claude commands
      ansible.builtin.file:
        src: "{{ item.path }}"
        dest: "{{ home_dir }}/.claude/commands/{{ item.path | basename }}"
        state: link
        force: yes
      loop: "{{ claude_commands.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      tags:
        - light
        - claude

    - name: Find repo Claude scripts
      ansible.builtin.find:
        paths: "{{ home_dir }}/koby-dev-env/configs/claude/scripts"
        patterns: "*.sh"
      register: claude_scripts
      tags:
        - light
        - claude

    - name: Link Claude scripts
      ansible.builtin.file:
        src: "{{ item.path }}"
        dest: "{{ home_dir }}/.claude/scripts/{{ item.path | basename }}"
        state: link
        force: yes
      loop: "{{ claude_scripts.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      tags:
        - light
        - claude

    - name: Find repo Claude skills
      ansible.builtin.find:
        paths: "{{ home_dir }}/koby-dev-env/configs/claude/skills"
        file_type: directory
        recurse: no
      register: claude_skills
      tags:
        - light
        - claude

    - name: Remove copied (non-symlink) skill dirs so they can be linked
      ansible.builtin.shell: |
        dest="{{ home_dir }}/.claude/skills/{{ item.path | basename }}"
        if [ -d "$dest" ] && [ ! -L "$dest" ]; then
          rm -rf "$dest"
          echo removed
        fi
      register: skill_dir_cleanup
      changed_when: "'removed' in skill_dir_cleanup.stdout"
      loop: "{{ claude_skills.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      tags:
        - light
        - claude

    - name: Link Claude skills
      ansible.builtin.file:
        src: "{{ item.path }}"
        dest: "{{ home_dir }}/.claude/skills/{{ item.path | basename }}"
        state: link
        force: yes
      loop: "{{ claude_skills.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      tags:
        - light
        - claude

    - name: Link Claude statusline script
      ansible.builtin.file:
        src: "{{ home_dir }}/koby-dev-env/configs/claude/statusline-command.sh"
        dest: "{{ home_dir }}/.claude/statusline-command.sh"
        state: link
        force: yes
      tags:
        - light
        - claude
    ### CLAUDE CONFIG END ###


    ### PFETCH START ###
    - name: Check if pfetch is installed (Linux)
      ansible.builtin.stat:
        path: /usr/local/bin/pfetch
      register: pfetch_installed
      when: is_linux
      tags:
        - light
        - pfetch

    - name: Install pfetch (Linux)
      block:

        - name: Download pfetch
          ansible.builtin.get_url:
            url: https://github.com/dylanaraps/pfetch/archive/master.zip
            dest: /tmp/pfetch-master.zip
        - name: Unzip pfetch
          ansible.builtin.unarchive:
            src: /tmp/pfetch-master.zip
            dest: /tmp/
            remote_src: yes
        - name: Install pfetch
          become: yes
          ansible.builtin.copy:
            src: /tmp/pfetch-master/pfetch
            dest: /usr/local/bin/pfetch
            mode: '0755'
            remote_src: yes
        - name: Clean up pfetch files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/pfetch-master.zip
            - /tmp/pfetch-master

      when:
        - is_linux
        - pfetch_installed.stat is defined
        - not pfetch_installed.stat.exists
      tags:
        - light
        - pfetch
    ### PFETCH END ###


    ### LAZY TOOLING START ###
    - name: Install Lazydocker (Linux)
      ansible.builtin.shell: curl https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash
      args:
        creates: /usr/local/bin/lazydocker
      when: is_linux
      tags:
        - light
        - lazydocker

    - name: Check if Lazygit is installed (Linux)
      ansible.builtin.stat:
        path: /usr/local/bin/lazygit
      register: lazygit_installed
      when: is_linux
      tags:
        - light
        - lazygit

    - name: Install Lazygit (Linux)
      block:

        - name: Set Lazygit download URL based on architecture
          ansible.builtin.set_fact:
            lazygit_url: "{{ 'https://github.com/jesseduffield/lazygit/releases/download/v0.43.1/lazygit_0.43.1_Linux_arm64.tar.gz' if ansible_architecture == 'aarch64' else 'https://github.com/jesseduffield/lazygit/releases/download/v0.43.1/lazygit_0.43.1_Linux_x86_64.tar.gz' }}"

        - name: Download Lazygit
          ansible.builtin.get_url:
            url: "{{ lazygit_url }}"
            dest: /tmp/lazygit.tar.gz
        - name: Extract Lazygit
          ansible.builtin.unarchive:
            src: /tmp/lazygit.tar.gz
            dest: /tmp/
            remote_src: yes
        - name: Install Lazygit
          become: yes
          ansible.builtin.copy:
            src: /tmp/lazygit
            dest: /usr/local/bin/lazygit
            mode: '0755'
            remote_src: yes
        - name: Clean up Lazygit files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/lazygit.tar.gz
            - /tmp/lazygit

      when:
        - is_linux
        - lazygit_installed.stat is defined
        - not lazygit_installed.stat.exists
      tags:
        - light
        - lazygit
    ### LAZY TOOLING END ###


    ### MISC HEAVY START ###
    - name: Install cargo
      ansible.builtin.shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      args:
        creates: "{{ home_dir }}/.cargo/bin/cargo"
      tags:
        - heavy
        - cargo

    - name: Install heavy packages (Linux)
      become: yes
      ansible.builtin.package:
        name: "{{ linux_heavy_packages }}"
        state: present
      when: is_linux
      tags:
        - heavy

    - name: Install heavy packages (macOS)
      community.general.homebrew:
        name: "{{ macos_heavy_packages }}"
        state: present
      when: is_macos
      tags:
        - heavy

    - name: Docker guidance for macOS
      ansible.builtin.debug:
        msg: |
          Docker on macOS requires Docker Desktop (GUI app) or an alternative like Colima.
          Install Docker Desktop: https://www.docker.com/products/docker-desktop/
          Or use Colima: brew install colima docker && colima start
          The 'docker' CLI has been included via the brew heavy packages if needed.
      when: is_macos
      tags:
        - heavy
        - docker
    ### MISC HEAVY END ###
